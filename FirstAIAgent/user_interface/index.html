<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First AI Agent</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="favicon.ico" />
    <div class="theme-toggle">
        <label for="theme-select">Theme:</label>
        <select id="theme-select">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </div>
</head>

<body>

    <div class="app">
        <header class="app-header">
            <h1>AI Agent Interface</h1>
            <p>AI messaging screen</p>
        </header>

        <main class="chat-container">
            <div id="messages" class="messages"></div>
        </main>

        <footer class="input-container">
            <form id="chat-form">
                <textarea id="user-input" placeholder="Ask anything!" rows="1"></textarea>
                <button id="restart-chat-button" type="button">↺</button>
                <button id="jump-to-top-button" type="button">↑</button>
                <button id = "mic-button" type="button" onclick="startListening()">🎤</button>
                <button id="send-button" type="submit">Send</button>
            </form>
            <div id="status" class="status"></div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
